name: Generate article audio

# Synthesizes narration (Piper TTS, open source, CPU) for new/changed articles,
# uploads MP3s to the `audio-library` GitHub Release and commits the updated
# audio-manifest.json — which triggers the normal Vercel deploy so the player
# appears on the site. Hash checks in the script make this incremental: only
# articles whose readable text changed are re-synthesized.

on:
  push:
    branches: [main]
    paths:
      - 'seed/content/en/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-audio
  cancel-in-progress: false

jobs:
  audio:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install piper-tts and ffmpeg
        run: |
          pip install piper-tts==1.2.0
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Cache voice models
        uses: actions/cache@v4
        with:
          path: .voices
          key: piper-voices-v1

      - name: Download voice models if missing
        run: |
          mkdir -p .voices
          base="https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0"
          for v in "en/en_US/ryan/high/en_US-ryan-high"; do
            name=$(basename "$v")
            [ -f ".voices/$name.onnx" ] || curl -sL "$base/$v.onnx" -o ".voices/$name.onnx"
            [ -f ".voices/$name.onnx.json" ] || curl -sL "$base/$v.onnx.json" -o ".voices/$name.onnx.json"
          done

      - name: Generate and upload audio
        env:
          GH_TOKEN: ${{ github.token }}
          PIPER_EXE: piper
          VOICES_DIR: ${{ github.workspace }}/.voices
        run: node src/scripts/generate-audio.mjs --all

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seed/content/audio-manifest.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(audio): update audio manifest"
            git pull --rebase origin main
            git push origin main
          fi
